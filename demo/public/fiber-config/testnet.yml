# Browser (WASM) Fiber node config — CKB testnet.
#
# Served at /fiber-config/testnet.yml (the demo's default ?config= / LiveConfig.configUrl)
# and passed verbatim to fiber-js `Fiber.start(config, …)` in live.ts. Verbatim from
# @nervosnetwork/fiber-js README's testnetConfig — the authoritative browser config.
#
# Key difference from a native fnn config: bootnode_addrs are **WSS** multiaddrs
# (/dns4/…/tcp/443/wss/…), because a browser node can only reach peers over WSS — the
# same reason our own counterparty fnn must be fronted by a tunnel (run-fnn-wss.sh).
# The browser opens its channel against THAT node (passed via ?peer=&wss=), while these
# bootnodes give it the testnet payment graph for routing.
#
# Note: the in-page node calls ckb.rpc_url directly from the browser, so that endpoint
# must allow CORS. https://testnet.ckbapp.dev/ is what fiber-js ships; if a browser CORS
# error appears, swap to another CORS-enabled CKB testnet RPC.
fiber:
  # standalone_watchtower_rpc_url: http://127.0.0.1:23456
  # disable_built_in_watchtower: true
  listening_addr: "/ip4/127.0.0.1/tcp/8228"
  bootnode_addrs:
    - "/dns4/thrall.fiber.channel/tcp/443/wss/p2p/Qmes1EBD4yNo9Ywkfe6eRw9tG1nVNGLDmMud1xJMsoYFKy"
    - "/dns4/onyxia.fiber.channel/tcp/443/wss/p2p/QmdyQWjPtbK4NWWsvy8s69NGJaQULwgeQDT5ZpNDrTNaeV"
  announce_listening_addr: false
  announced_addrs:
    # If you want to announce your fiber node public address to the network, you need to add the address here, please change the ip to your public ip accordingly.
    # - "/ip4/YOUR-FIBER-NODE-PUBLIC-IP/tcp/8228"
  chain: testnet

  # Never ban gossip peers. The gossip ban policy is SYMMETRIC: our counterparty fnn
  # already disables it server-side, but the in-browser node runs the same code — a
  # fresh browser node doing initial graph sync rejects some of the fnn's gossip
  # (e.g. incomplete-backlog), racks up PolicyRejectedMessage violations (25 pts,
  # default ban at 100) and BANS + DISCONNECTS the fnn a few minutes after connect,
  # killing the channel session. Rejected gossip is harmless; never escalate to a ban.
  gossip_policy:
    ban:
      threshold: 4294967295
  # lock script configurations related to fiber network
  # https://github.com/nervosnetwork/fiber-scripts/blob/main/deployment/testnet/migrations/2025-02-28-111246.json
  scripts:
    - name: FundingLock
      script:
        code_hash: 0x6c67887fe201ee0c7853f1682c0b77c0e6214044c156c7558269390a8afa6d7c
        hash_type: type
        args: 0x
      cell_deps:
        - type_id:
            code_hash: 0x00000000000000000000000000000000000000000000000000545950455f4944
            hash_type: type
            args: 0x3cb7c0304fe53f75bb5727e2484d0beae4bd99d979813c6fc97c3cca569f10f6
        - cell_dep:
            out_point:
              tx_hash: 0x12c569a258dd9c5bd99f632bb8314b1263b90921ba31496467580d6b79dd14a7 # ckb_auth
              index: 0x0
            dep_type: code
    - name: CommitmentLock
      script:
        code_hash: 0x740dee83f87c6f309824d8fd3fbdd3c8380ee6fc9acc90b1a748438afcdf81d8
        hash_type: type
        args: 0x
      cell_deps:
        - type_id:
            code_hash: 0x00000000000000000000000000000000000000000000000000545950455f4944
            hash_type: type
            args: 0xf7e458887495cf70dd30d1543cad47dc1dfe9d874177bf19291e4db478d5751b
        - cell_dep:
            out_point:
              tx_hash: 0x12c569a258dd9c5bd99f632bb8314b1263b90921ba31496467580d6b79dd14a7 #ckb_auth
              index: 0x0
            dep_type: code

rpc:
  # By default RPC only binds to localhost, thus it only allows accessing from the same machine.
  # Allowing arbitrary machines to access the JSON-RPC port is dangerous and strongly discouraged.
  # Please strictly limit the access to only trusted machines.
  listening_addr: "127.0.0.1:8227"

ckb:
  rpc_url: "https://testnet.ckbapp.dev/"
  udt_whitelist:
    - name: RUSD
      script:
        code_hash: 0x1142755a044bf2ee358cba9f2da187ce928c91cd4dc8692ded0337efa677d21a
        hash_type: type
        args: 0x878fcc6f1f08d48e87bb1c3b3d5083f23f8a39c5d5c764f253b55b998526439b
      cell_deps:
        - type_id:
            code_hash: 0x00000000000000000000000000000000000000000000000000545950455f4944
            hash_type: type
            args: 0x97d30b723c0b2c66e9cb8d4d0df4ab5d7222cbb00d4a9a2055ce2e5d7f0d8b0f
      auto_accept_amount: 1000000000

services:
  - fiber
  - rpc
  - ckb
